appId: one.myclaw.desktop
productName: MyClaw.One Desktop
directories:
  buildResources: build
files:
  - '!**/.vscode/*'
  - '!src/*'
  - '!electron.vite.config.{js,ts,mjs,cjs}'
  - '!{.eslintcache,eslint.config.mjs,.prettierignore,.prettierrc.yaml,dev-app-update.yml,CHANGELOG.md,README.md}'
  - '!{.env,.env.*,.npmrc,pnpm-lock.yaml}'
  - '!{tsconfig.json,tsconfig.node.json,tsconfig.web.json}'
  - '!studio/**'
  - '!dist-studio/**'
  - '!dist-openclaw/**'
  - '!resources/node/**'
  - '!tests/**'
  - '!playwright.config.ts'
extraResources:
  # Bundled Node 24 runtime. ${platform}/${arch} expand per-target build, so
  # a Linux package only ships linux-x64, etc. Populate via:
  #   node scripts/download-node.mjs
  #
  # The explicit filter overrides electron-builder's default extraResources
  # exclusions, which otherwise drop `**/node_modules/**` and ship a
  # half-bundle (node.exe alone, no npm). v0.1.4 + v0.1.5 hit exactly this.
  - from: resources/node/${platform}-${arch}/
    to: node/${platform}-${arch}/
    filter:
      - '**/*'
  # Embedded Studio (production tree, deps pruned). Populate via:
  #   node scripts/build-studio.mjs
  - from: dist-studio/
    to: studio/
    filter:
      - '**/*'
  # Bundled openclaw — preinstalled at desktop build time so users don't
  # depend on `npm install` working on their machine at first launch
  # (Windows ENOENT, lifecycle scripts, registry hiccups, etc.). Populate
  # via: node scripts/build-openclaw.mjs
  - from: dist-openclaw/
    to: openclaw/
    filter:
      - '**/*'
asarUnpack:
  - resources/**
win:
  executableName: myclaw-desk
nsis:
  artifactName: ${name}-${version}-setup.${ext}
  shortcutName: ${productName}
  uninstallDisplayName: ${productName}
  createDesktopShortcut: always
mac:
  entitlementsInherit: build/entitlements.mac.plist
  extendInfo:
    - NSCameraUsageDescription: Application requests access to the device's camera.
    - NSMicrophoneUsageDescription: Application requests access to the device's microphone.
    - NSDocumentsFolderUsageDescription: Application requests access to the user's Documents folder.
    - NSDownloadsFolderUsageDescription: Application requests access to the user's Downloads folder.
  notarize: false
dmg:
  artifactName: ${name}-${version}.${ext}
linux:
  # Stick to AppImage for the first release — snap/deb need snapcraft/fpm
  # tooling that isn't installed on a vanilla machine. Re-add later.
  target:
    - AppImage
  maintainer: MyClaw.One
  category: Utility
appImage:
  artifactName: ${name}-${version}.${ext}
npmRebuild: false
publish:
  provider: github
  owner: microblue
  repo: myclaw-desk
